<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تم إرسال الطلب</title>

<style>

body{

font-family:Arial,sans-serif;

background:#f5f5f5;

display:flex;

justify-content:center;

align-items:center;

height:100vh;

margin:0;

}

.box{

background:white;

padding:35px;

border-radius:18px;

box-shadow:0 10px 30px rgba(0,0,0,.15);

text-align:center;

width:90%;

max-width:500px;

}

h1{

font-size:34px;

color:#16a34a;

cursor:pointer;

user-select:none;

}

p{

font-size:18px;

line-height:1.8;

color:#555;

}

a{

display:inline-block;

margin-top:25px;

padding:15px 30px;

background:#c41e24;

color:#fff;

text-decoration:none;

border-radius:10px;

font-size:18px;

}

</style>

</head>

<body>

<div class="box">

<h1 id="successTitle">✅ تم إرسال الطلب بنجاح</h1>

<p>

تم استلام طلبك بنجاح.

</p>

<a href="index.html">

العودة للرئيسية

</a>

</div>

<script>

let count = 0;

document.getElementById("successTitle").addEventListener("click",function(){

count++;

if(count>=5){

count=0;

let pass = prompt("أدخل كلمة مرور المطور");

if(pass==="IBOK2026"){

window.location.href="developer.html";

}else{

alert("كلمة المرور غير صحيحة");

}

}

});

</script>

</body>

</html>
