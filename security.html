<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سؤال الأمان</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/cards.css">
<link rel="stylesheet" href="css/forms.css">
<link rel="stylesheet" href="css/responsive.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

<header class="top-header">

<div class="service-btn">
خدمات بنكك أونلاين
</div>

<div class="logo">
بنكك
</div>

</header>

<section class="hero">

<h1>سؤال الأمان</h1>

<p>
للتحقق من هويتك يرجى الإجابة على سؤال الأمان.
</p>

</section>

<section class="service-page">

<div class="service-card">

<div class="service-icon">
<i class="fa-solid fa-shield-halved" style="color:#C41E24;"></i>
</div>

<h2>التحقق من الهوية</h2>

<div class="form-group">

<label>اختر سؤال الأمان</label>

<select class="form-control" id="question">

<option value="">-- اختر سؤال الأمان --</option>

<option>ما هو اسم ابن عمك الأول؟</option>

<option>في أي مدينة ولدت؟</option>

<option>في أي سنة تخرجت من الجامعة؟</option>

<option>ماذا كان لقبك أثناء الطفولة؟</option>

<option>اسم مؤلفك المفضل؟</option>

<option>أي فيلم هو المفضل لديك؟</option>

<option>اسم أفضل صديق في الطفولة؟</option>

<option>في أي عام حصلت على رخصة القيادة؟</option>

<option>في أي سنة تزوجت؟</option>

<option>ما هي ماركة سيارتك الأولى؟</option>

</select>

</div>

<div class="form-group">

<label>الإجابة</label>

<input
type="text"
id="answer"
class="form-control"
placeholder="اكتب الإجابة هنا">

</div>

<a href="#" class="main-btn" id="nextBtn">
إرسال
</a>

</div>

</section>

<script src="js/security.js"></script>

</body>

</html>
